name: Deploy to EC2

on:
  push:
    branches: [ develop ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Java 17 설정
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Gradle 빌드
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: EC2에 jar 전송
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/market-project-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/project1"

      - name: EC2에서 재시작
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 5m
          script: |
            CURRENT_PID=$(ps -ef | grep java | grep market-project | awk '{print $2}')
            if [ -n "$CURRENT_PID" ]; then
                kill -15 $CURRENT_PID
                sleep 5
            fi
            nohup java -jar -Dspring.profiles.active=prod \
                /home/ec2-user/project1/build/libs/market-project-0.0.1-SNAPSHOT.jar \
                > /home/ec2-user/app.log 2>&1 &
            echo "배포 완료"