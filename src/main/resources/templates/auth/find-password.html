<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('비밀번호 찾기')}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>

<div class="container" style="max-width: 400px; margin-top: 80px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">비밀번호 찾기</h4>
            <div id="errorMsg" class="alert alert-danger d-none"></div>
            <div id="successMsg" class="alert alert-success d-none"></div>

            <!-- 1단계: 아이디 + 이메일 입력 -->
            <div id="step1">
                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input type="text" id="loginId" class="form-control" placeholder="아이디 입력">
                </div>
                <div class="mb-3">
                    <label class="form-label">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="이메일 입력">
                </div>
                <button class="btn btn-dark w-100" onclick="sendCode()">인증코드 발송</button>
            </div>

            <!-- 2단계: 인증코드 입력 -->
            <div id="step2" class="d-none">
                <div class="mb-3">
                    <label class="form-label">인증코드</label>
                    <input type="text" id="code" class="form-control" placeholder="인증코드 입력">
                </div>
                <button class="btn btn-dark w-100" onclick="verifyCode()">확인</button>
            </div>

            <!-- 3단계: 새 비밀번호 입력 -->
            <div id="step3" class="d-none">
                <div class="mb-3">
                    <label class="form-label">새 비밀번호</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="8자 이상">
                </div>
                <div class="mb-3">
                    <label class="form-label">새 비밀번호 확인</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="비밀번호 재입력">
                </div>
                <button class="btn btn-dark w-100" onclick="resetPassword()">변경 완료</button>
            </div>

            <div class="text-center mt-3" style="font-size:14px;">
                <a href="/login" class="text-muted">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>
</div>

<script>
    let verifiedEmail = '';

    function sendCode() {
        const loginId = document.getElementById('loginId').value;
        const email = document.getElementById('email').value;

        fetch('/api/auth/reset-password/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginId, email })
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                verifiedEmail = email;
                document.getElementById('step1').classList.add('d-none');
                document.getElementById('step2').classList.remove('d-none');
                showSuccess('인증코드가 이메일로 발송되었습니다.');
            })
            .catch(() => showError('아이디 또는 이메일이 올바르지 않습니다.'));
    }

    function verifyCode() {
        const code = document.getElementById('code').value;

        fetch('/api/auth/reset-password/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: verifiedEmail, code })
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                document.getElementById('step2').classList.add('d-none');
                document.getElementById('step3').classList.remove('d-none');
                showSuccess('인증이 완료되었습니다. 새 비밀번호를 입력해주세요.');
            })
            .catch(() => showError('인증코드가 올바르지 않습니다.'));
    }

    function resetPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            showError('비밀번호가 일치하지 않습니다.');
            return;
        }

        if (newPassword.length < 8) {
            showError('비밀번호는 8자 이상이어야 합니다.');
            return;
        }

        fetch('/api/auth/reset-password/confirm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: verifiedEmail, newPassword })
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                showSuccess('비밀번호가 변경되었습니다.');
                setTimeout(() => location.href = '/login', 2000);
            })
            .catch(() => showError('비밀번호 변경에 실패했습니다.'));
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
        document.getElementById('successMsg').classList.add('d-none');
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
        document.getElementById('errorMsg').classList.add('d-none');
    }
</script>
</body>
</html>
