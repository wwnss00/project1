<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('채팅')}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>

<div class="container mt-4" style="max-width: 600px;">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex align-items-center">
            <button class="btn btn-sm btn-outline-light me-2" onclick="location.href='/chat/rooms'">←</button>
            <span>채팅방</span>
        </div>
        <div id="messages" class="card-body" style="height:450px; overflow-y:auto; background:#f5f5f5;"></div>
        <div class="card-footer">
            <div class="input-group">
                <input type="text" id="messageInput" class="form-control" placeholder="메시지 입력">
                <button class="btn btn-dark" onclick="sendMessage()">전송</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.2/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script>
    const roomId = location.pathname.split('/').pop();
    let stompClient = null;
    let myUserId = null;

    // 내 userId 가져오기
    fetch('/api/users/me', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
        .then(res => res.json())
        .then(data => {
            myUserId = data.id;
            loadMessages();
            connectWebSocket();
        });

    function loadMessages() {
        fetch(`/api/chat/rooms/${roomId}/messages`, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
            .then(res => res.json())
            .then(messages => messages.forEach(m => addMessage(m)));
    }

    function connectWebSocket() {
        const socket = new SockJS('/ws/chat');
        stompClient = Stomp.over(socket);
        stompClient.connect(
            { 'Authorization': 'Bearer ' + token },
            function() {
                stompClient.subscribe('/sub/chat/room/' + roomId, function(msg) {
                    addMessage(JSON.parse(msg.body));
                });
            }
        );
    }

    function sendMessage() {
        const content = document.getElementById('messageInput').value;
        if (!content.trim()) return;

        stompClient.send('/pub/chat/message', {}, JSON.stringify({
            roomId: parseInt(roomId),
            content: content
        }));
        document.getElementById('messageInput').value = '';
    }

    function addMessage(msg) {
        const isMine = msg.senderId === myUserId;
        const time = msg.createdAt
            ? new Date(msg.createdAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
            : '';

        const div = document.createElement('div');
        div.className = `d-flex mb-2 ${isMine ? 'justify-content-end' : 'justify-content-start'}`;
        div.innerHTML = `
            <div style="max-width:60%;">
                ${!isMine ? `<small class="text-muted d-block mb-1">${msg.senderNickname}</small>` : ''}
                <div class="px-3 py-2 rounded" style="background:${isMine ? '#dcf8c6' : '#ffffff'};">
                    ${msg.content}
                </div>
                <small class="text-muted d-block mt-1 ${isMine ? 'text-end' : ''}">${time}</small>
            </div>
        `;
        document.getElementById('messages').appendChild(div);
        const messages = document.getElementById('messages');
        messages.scrollTop = messages.scrollHeight;
    }

    document.getElementById('messageInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
