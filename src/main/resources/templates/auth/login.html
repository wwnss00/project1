<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('로그인')}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>

<div class="container" style="max-width: 400px; margin-top: 80px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">로그인</h4>

            <div id="errorMsg" class="alert alert-danger d-none"></div>

            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input type="text" id="loginId" class="form-control" placeholder="아이디 입력">
            </div>
            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input type="password" id="password" class="form-control" placeholder="비밀번호 입력">
            </div>

            <button class="btn btn-dark w-100 mb-3" onclick="login()">로그인</button>

            <hr>

            <a href="/oauth2/authorization/google" class="btn btn-outline-danger w-100 mb-2">
                Google로 로그인
            </a>
            <a href="/oauth2/authorization/naver" class="btn btn-outline-success w-100 mb-3">
                Naver로 로그인
            </a>

            <div class="text-center mt-2" style="font-size: 14px;">
                <a href="/find-id" class="text-muted me-2">아이디 찾기</a> |
                <a href="/find-password" class="text-muted mx-2">비밀번호 찾기</a> |
                <a href="/register" class="text-muted ms-2">회원가입</a>
            </div>
        </div>
    </div>
</div>

<script>
    function login() {
        const loginId = document.getElementById('loginId').value;
        const password = document.getElementById('password').value;

        fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ loginId, password })
        })
            .then(response => {
                if (!response.ok) throw new Error('로그인 실패');
                return response.json();
            })
            .then(data => {
                // 토큰 저장
                localStorage.setItem('accessToken', data.accessToken);
                window.location.href = '/posts';
            })
            .catch(() => {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
                errorMsg.classList.remove('d-none');
            });
    }

    // 엔터키로 로그인
    document.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
