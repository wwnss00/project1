<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('회원정보 수정')}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>

<div class="container mt-4" style="max-width: 500px;">
    <h4 class="mb-4">회원정보 수정</h4>
    <div class="card shadow-sm p-4">
        <div class="mb-3">
            <label class="form-label">프로필 이미지</label>
            <input type="file" id="profileImage" class="form-control" accept="image/*">
        </div>
        <button class="btn btn-outline-dark btn-sm mb-3" onclick="updateProfileImage()">이미지 변경</button>`
        <div class="mb-3">
            <label class="form-label">닉네임</label>
            <input type="text" id="nickname" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">전화번호</label>
            <input type="text" id="phone" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">주소</label>
            <input type="text" id="address" class="form-control">
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-dark" onclick="updateProfile()">수정 완료</button>
            <button class="btn btn-secondary" onclick="location.href='/mypage'">취소</button>
        </div>

        <hr>

        <h6>비밀번호 변경</h6>
        <div class="mb-3">
            <label class="form-label">현재 비밀번호</label>
            <input type="password" id="currentPassword" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">새 비밀번호</label>
            <input type="password" id="newPassword" class="form-control">
        </div>
        <button class="btn btn-outline-dark" onclick="updatePassword()">비밀번호 변경</button>
    </div>
</div>

<script>
    // 현재 정보 불러오기
    fetch('/api/users/me', {
        headers: { 'Authorization': 'Bearer ' + token }
    })
        .then(res => res.json())
        .then(user => {
            document.getElementById('nickname').value = user.nickname || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('address').value = user.address || '';
        });

    function updateProfile() {
        fetch('/api/users/me', {
            method: 'PATCH',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                nickname: document.getElementById('nickname').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value
            })
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                alert('수정되었습니다.');
                location.href = '/mypage';
            })
            .catch(() => alert('수정에 실패했습니다.'));
    }

    function updateProfileImage() {
        const file = document.getElementById('profileImage').files[0];
        if (!file) { alert('이미지를 선택해주세요.'); return; }

        const formData = new FormData();
        formData.append('image', file);

        fetch('/api/users/me/profile-image', {
            method: 'PATCH',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                alert('프로필 이미지가 변경되었습니다.');
            })
            .catch(() => alert('이미지 변경에 실패했습니다.'));
    }

    function updatePassword() {
        fetch('/api/users/me/password', {
            method: 'PATCH',
            headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                currentPassword: document.getElementById('currentPassword').value,
                newPassword: document.getElementById('newPassword').value
            })
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                alert('비밀번호가 변경되었습니다.');
            })
            .catch(() => alert('비밀번호 변경에 실패했습니다.'));
    }
</script>
</body>
</html>
