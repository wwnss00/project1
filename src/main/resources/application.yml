spring:
  config:
    import: optional:application-secret.yml
  profiles:
    active: local
    include: secret
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

cookie:
  secure: false
  max-age: 1209600