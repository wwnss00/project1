spring:
  config:
    import: optional:application-secret.yml
  profiles:
    active: local  # ??? local(H2) ??
    include: secret  # JWT 설정 로드
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB        # 파일 하나 최대 10MB
      max-request-size: 50MB     # 전체 요청 최대 50MB

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

# 파일 업로드 설정
file:
  upload-dir: ${user.home}/uploads/images/

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs