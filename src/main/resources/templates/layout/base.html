<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
      < xmlns:sec="http://www.thymeleaf.org/extras/springsecurity">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">중고마켓</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
<nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">중고마켓</a>
        <div class="navbar-nav ms-auto flex-row gap-3" id="authLinks"></div>
    </div>
</nav>

<script th:fragment="nav">
    document.querySelector('.navbar-brand').href = '/posts';
    window.token = localStorage.getItem('accessToken');
    const authLinks = document.getElementById('authLinks');
    if (window.token) {
        fetch('/api/users/me', {
            headers: { 'Authorization': 'Bearer ' + token }
        })
            .then(res => res.json())
            .then(user => {
                const adminMenu = user.role === 'ADMIN'
                    ? `<a class="nav-link text-white d-inline" href="/admin">어드민</a>`
                    : '';

                authLinks.innerHTML = `
                <a class="nav-link text-white d-inline" href="/posts">게시글</a>
                <a class="nav-link text-white d-inline" href="#" onclick="goChat()">채팅</a>
                <a class="nav-link text-white d-inline" href="#" onclick="goMypage()">마이페이지</a>
                ${adminMenu}
                <a class="nav-link text-white d-inline" href="#" onclick="logout(event)">로그아웃</a>
            `;
            });
    } else {
        authLinks.innerHTML = `
        <a class="nav-link text-white d-inline" href="/posts">게시글</a>
        <a class="nav-link text-white d-inline" href="/login">로그인</a>
        <a class="nav-link text-white d-inline" href="/register">회원가입</a>
    `;
    }

    function goChat() {
        if (!window.token) { alert('로그인이 필요합니다.'); location.href = '/login'; return; }
        location.href = '/chat/rooms';
    }

    function goMypage() {
        if (!window.token) { alert('로그인이 필요합니다.'); location.href = '/login'; return; }
        location.href = '/mypage';
    }

    function logout(e) {
        e.preventDefault();
        fetch('/api/auth/logout', { method: 'POST' })
            .then(() => {
                localStorage.removeItem('accessToken');
                window.location.href = '/login';
            });
    }
</script>
</body>
</html>
