services:
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    restart: always

  app:
    image: jkl2085/market-project:latest
    container_name: market-project
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_CONFIG_ADDITIONAL_LOCATION=file:/app/
    volumes:
      - /home/ec2-user/application-prod.yml:/app/application-prod.yml
      - /home/ec2-user/application-secret.yml:/app/application-secret.yml
    restart: always