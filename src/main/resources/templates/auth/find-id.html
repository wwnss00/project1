<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('아이디 찾기')}"></head>
<body>
<nav th:replace="~{layout/base :: nav}"></nav>

<div class="container" style="max-width: 400px; margin-top: 80px;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">아이디 찾기</h4>
            <div id="errorMsg" class="alert alert-danger d-none"></div>
            <div id="successMsg" class="alert alert-success d-none"></div>

            <!-- 1단계: 이름 + 이메일 입력 -->
            <div id="step1">
                <div class="mb-3">
                    <label class="form-label">이름</label>
                    <input type="text" id="name" class="form-control" placeholder="이름 입력">
                </div>
                <div class="mb-3">
                    <label class="form-label">이메일</label>
                    <input type="email" id="email" class="form-control" placeholder="이메일 입력">
                </div>
                <button class="btn btn-dark w-100" onclick="sendCode()">인증코드 발송</button>
            </div>

            <!-- 2단계: 인증코드 입력 -->
            <div id="step2" class="d-none">
                <div class="mb-3">
                    <label class="form-label">인증코드</label>
                    <input type="text" id="code" class="form-control" placeholder="인증코드 입력">
                </div>
                <button class="btn btn-dark w-100" onclick="verifyCode()">확인</button>
            </div>

            <div class="text-center mt-3" style="font-size:14px;">
                <a href="/login" class="text-muted">로그인으로 돌아가기</a>
            </div>
        </div>
    </div>
</div>

<script>
    function sendCode() {
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;

        fetch('/api/auth/find-loginid/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email })
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                document.getElementById('step1').classList.add('d-none');
                document.getElementById('step2').classList.remove('d-none');
                showSuccess('인증코드가 이메일로 발송되었습니다.');
            })
            .catch(() => showError('이름 또는 이메일이 올바르지 않습니다.'));
    }

    function verifyCode() {
        const email = document.getElementById('email').value;
        const code = document.getElementById('code').value;

        fetch('/api/auth/find-loginid/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code })
        })
            .then(res => {
                if (!res.ok) throw new Error('실패');
                return res.json();
            })
            .then(data => {
                document.getElementById('step2').classList.add('d-none');
                showSuccess(`아이디는 "${data.loginId}" 입니다.`);
            })
            .catch(() => showError('인증코드가 올바르지 않습니다.'));
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
        document.getElementById('successMsg').classList.add('d-none');
    }

    function showSuccess(msg) {
        const el = document.getElementById('successMsg');
        el.textContent = msg;
        el.classList.remove('d-none');
        document.getElementById('errorMsg').classList.add('d-none');
    }
</script>
</body>
</html>
